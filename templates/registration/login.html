{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EVE Pilot &mdash; Connexion</title>
    <link rel="icon" type="image/png" href="{% static 'img/eve-logo.png' %}">
    <link rel="stylesheet" href="{% static 'css/eve.css' %}">
    <style>
        body {
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            width: min(calc(100% - 36px), 440px);
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid rgba(255, 255, 255, 0.92);
            border-radius: 28px;
            box-shadow: 0 28px 60px rgba(14, 77, 54, 0.15);
            padding: 36px 34px 32px;
            text-align: center;
        }
        .login-logo {
            width: 92px; height: 92px;
            display: block; margin: 0 auto 12px;
            filter: drop-shadow(0 6px 14px rgba(14, 77, 54, 0.2));
        }
        .login-card h1 {
            font-family: "Georgia", "Cambria", serif;
            font-size: 2rem; margin: 4px 0 4px;
            color: var(--eve-green-900);
        }
        .login-card .sub { color: var(--muted); font-size: 0.95rem; margin: 0 0 22px; }
        .login-form { text-align: left; }
        .login-form label {
            display: block; font-weight: 700; margin-bottom: 6px; font-size: 0.9rem;
        }
        .login-form input {
            width: 100%; margin-bottom: 16px;
        }
        .login-form button {
            width: 100%; padding: 13px 16px; border-radius: 999px;
            border: none; background: var(--eve-green-700); color: white;
            font-weight: 700; font-size: 1rem; cursor: pointer;
            transition: background 0.15s;
        }
        .login-form button:hover { background: var(--eve-green-900); }
        .login-errors {
            background: var(--eve-red-100); color: var(--eve-red-700);
            border-radius: 12px; padding: 10px 14px;
            font-size: 0.88rem; margin-bottom: 16px;
            border: 1px solid rgba(185, 48, 42, 0.22);
        }
        .foot {
            margin-top: 22px; font-size: 0.82rem; color: var(--muted);
        }
        .foot a { color: var(--eve-green-700); font-weight: 700; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="{% static 'img/eve-logo.png' %}" alt="EVE" class="login-logo">
        <h1>EVE Pilot</h1>
        <p class="sub">ONG Eau Vie Environnement &middot; Plateforme de gestion</p>

        {% if form.errors %}
        <div class="login-errors">
            Identifiants invalides. V&eacute;rifiez le nom d'utilisateur et le mot de passe.
        </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}" class="login-form">
            {% csrf_token %}
            <label for="id_username">Nom d'utilisateur</label>
            <input type="text" name="username" id="id_username" autofocus required autocomplete="username">

            <label for="id_password">Mot de passe</label>
            <input type="password" name="password" id="id_password" required autocomplete="current-password">

            <input type="hidden" name="next" value="{{ next }}">
            <button type="submit">Se connecter</button>
        </form>

        <div class="foot">
            Acc&egrave;s administration technique : <a href="/admin/">/admin/</a>
        </div>
    </div>
</body>
</html>
