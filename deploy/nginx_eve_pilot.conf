# nginx — EVE Pilot. Copier dans /etc/nginx/sites-available/eve_pilot puis :
#   sudo ln -s /etc/nginx/sites-available/eve_pilot /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Remplacer pilot.eve-sn.org par votre (sous-)domaine partout.

upstream eve_pilot_app {
    server 127.0.0.1:8001 fail_timeout=0;
}

# 1) HTTP : ne sert que le challenge Let's Encrypt + redirige tout vers HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name pilot.eve-sn.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# 2) HTTPS : l'application.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name pilot.eve-sn.org;

    # Certificats Let's Encrypt (genere par : certbot certonly --webroot -w /var/www/certbot -d pilot.eve-sn.org)
    ssl_certificate     /etc/letsencrypt/live/pilot.eve-sn.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pilot.eve-sn.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # En-tetes de securite (HSTS est aussi pose par Django, double ceinture).
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy same-origin always;

    # Taille max des pieces jointes (justificatifs PDF/images). Ajuster au besoin.
    client_max_body_size 25M;

    # Fichiers statiques (collectes par collectstatic). Accessibles publiquement
    # (CSS, JS, logo) — aucune donnee sensible ici.
    location /static/ {
        alias /srv/eve_pilot/staticfiles/;
        access_log off;
        expires 30d;
    }

    # MEDIAS PROTEGES : location `internal`, atteignable UNIQUEMENT via
    # l'en-tete X-Accel-Redirect emis par la vue Django protected_media (login
    # requis). Un acces direct a /__protected_media__/... renvoie 404.
    location /__protected_media__/ {
        internal;
        alias /srv/eve_pilot/media/;
    }

    # Tout le reste -> l'application Django.
    location / {
        proxy_pass http://eve_pilot_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # CRITIQUE : indique a Django que l'origine est en HTTPS
        # (cf. SECURE_PROXY_SSL_HEADER dans settings.py).
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
